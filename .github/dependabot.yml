version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "chore"

    ignore:
      # --- Expo SDK-managed packages ---
      # These are version-locked to the Expo SDK.
      # Update only via `npx expo install <package>` as part of an SDK upgrade.
      - dependency-name: "react-native"
        versions: ["*"]
      - dependency-name: "react"
        versions: ["*"]
      - dependency-name: "@types/react"
        versions: ["*"]
      - dependency-name: "expo"
        versions: ["*"]
      - dependency-name: "expo-*"
        versions: ["*"]
      - dependency-name: "eslint-config-expo"
        versions: ["*"]
      - dependency-name: "react-native-*"
        versions: ["*"]
      - dependency-name: "@react-native-community/*"
        versions: ["*"]
      - dependency-name: "@react-navigation/*"
        versions: ["*"]

      # --- TypeScript: patch-only ---
      # Major/minor may introduce breaking changes — review manually.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

      # --- ESLint: patch-only ---
      # Major updates can change rule behavior and break CI lint step.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

    # NOTE: Dependabot scope will be expanded once V1.1 test coverage
    # is in place (Unit + Integration + E2E). With a full test suite
    # running in CI, automated updates can be trusted more broadly.
